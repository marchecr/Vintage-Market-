<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Vendor Registration Form</title>\n    <script>\n        function validateForm() {\n            let brandName = document.forms["vendorForm"]["brandName"].value;\n            let firstName = document.forms["vendorForm"]["firstName"].value;\n            let lastName = document.forms["vendorForm"]["lastName"].value;\n            let email = document.forms["vendorForm"]["email"].value;\n            let phone = document.forms["vendorForm"]["phone"].value;\n            let city = document.forms["vendorForm"]["city"].value;\n            let items = document.forms["vendorForm"]["items"].value;\n            let categories = document.forms["vendorForm"]["categories"].value;\n            let message = document.forms["vendorForm"]["message"].value;\n\n            if (brandName == "" || firstName == "" || lastName == "" || email == "" || phone == "" || city == "" || items == "" || categories == "") {\n                alert("All fields must be filled out.");\n                return false;\n            }\n            // WhatsApp integration\n            let whatsappMessage = `Brand: ${brandName}, First Name: ${firstName}, Last Name: ${lastName}, Email: ${email}, Phone: ${phone}, City: ${city}, Items: ${items}, Categories: ${categories}, Message: ${message}`;\n            let whatsappLink = `https://wa.me/212661104097?text=${encodeURIComponent(whatsappMessage)}`;\n            window.open(whatsappLink);\n            return false; // Prevent form submission\n        }\n    </script>\n</head>\n<body>\n    <h1>Vendor Registration Form</h1>\n    <form name="vendorForm" onsubmit="return validateForm()">\n        <label for="brandName">Brand Name:</label>\n        <input type="text" id="brandName" name="brandName"><br><br>\n        <label for="firstName">First Name:</label>\n        <input type="text" id="firstName" name="firstName"><br><br>\n        <label for="lastName">Last Name:</label>\n        <input type="text" id="lastName" name="lastName"><br><br>\n        <label for="email">Email:</label>\n        <input type="email" id="email" name="email"><br><br>\n        <label for="phone">Phone Number:</label>\n        <input type="text" id="phone" name="phone"><br><br>\n        <label for="city">City:</label>\n        <input type="text" id="city" name="city"><br><br>\n        <label for="items">Items to Sell:</label>\n        <input type="text" id="items" name="items"><br><br>\n        <label for="categories">Categories:</label>\n        <input type="text" id="categories" name="categories"><br><br>\n        <label for="message">Additional Message:</label>\n        <textarea id="message" name="message"></textarea><br><br>\n        <input type="submit" value="Submit">\n    </form>\n</body>\n</html>
